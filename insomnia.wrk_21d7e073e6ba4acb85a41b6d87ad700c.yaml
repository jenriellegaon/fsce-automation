          - url: "{{_['host']}}/access-token"
            name: Upload Auto -> Auto Disbursement -> DISCOUNTED
            meta:
              id: req_d970906d40cb419097f936a759e97fe0
              created: 1773627777350
              modified: 1773901148775
              isPrivate: false
              description: ""
              sortKey: -1773627756573
            method: POST
            body:
              mimeType: application/json
              text: "{\r

                \    \"userId\": \"{{userId}}\",\r

                \    \"password\": \"{{password}}\"\r

                }"
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              afterResponse: >-
                insomnia.test("Sequential API Chain: Token -> Upload -> Auto
                Disbursement -> DISCOUNTED", async function () {
                    const generateRandomString = (length) => {
                        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                        let result = '';
                        for (let i = 0; i < length; i++) {
                            result += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        return result;
                    };

                    const generateRandomNumber = (length) => {
                        const chars = '0123456789';
                        let result = '';
                        for (let i = 0; i < length; i++) {
                            result += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        return result;
                    };

                    const send = (req) => {
                        return new Promise((resolve, reject) => {
                            insomnia.sendRequest(req, (err, res) => {
                                if (err) reject(err);
                                else resolve(res);
                            });
                        });
                    };

                    try {

                        const tokenResponse = insomnia.response.json();

                        if (tokenResponse.success !== true) {
                            throw new Error("Token request failed");
                        }

                        const token = tokenResponse.result;
                        insomnia.environment.set("blockchain_token", token);

                        const batchId = generateRandomString(10);
                        const generatedDocNum = generateRandomString(12);

                        const date = new Date();
                        const randomDays = Math.floor(Math.random() * 30) + 1;
                        date.setDate(date.getDate() + randomDays);

                        const futureDueDate = date.toISOString().split('T')[0];
                        const today = new Date().toISOString().split('T')[0];

                        // 🔹 Upload
                        const uploadRequest = {
                            url: `${insomnia.environment.get('host')}/invoice/upload`,
                            method: "POST",
                            header: {
                                "Content-Type": "application/json",
                                "Authorization": `Bearer ${token}`
                            },
                            body: {
                                mode: 'raw',
                                raw: JSON.stringify({
                                    role: "BUYER",
                                    userId: insomnia.variables.replaceIn('{{$randomUUID}}'),
                                    uploadCode: "internal",
                                    data: {
                                        batchId,
                                        fileName: "uploadfile.csv",
                                        orgCode: "EBC",
                                        role: "BUYER",
                                        documents: [{
                                            documentNumber: generatedDocNum,
                                            documentType: "IN",
                                            buyerCode: "EBC",
                                            buyerName: "Example Buyer Company",
                                            sellerCode: "ESC",
                                            sellerName: "Example Seller Company",
                                            transactionDate: today,
                                            deliveryDate: today,
                                            dueDate: futureDueDate,
                                            currency: "PHP",
                                            outstandingAmount: 1000,
                                            totalAmount: "1000.00",
                                            prioritySeller: true
                                        }]
                                    }
                                })
                            }
                        };

                        const uploadRes = await send(uploadRequest);

                        insomnia.test("PD Flow: Invoice Upload", () => {
                            insomnia.expect(uploadRes.code).to.be.oneOf([200, 201]);
                        });

                        const uploadData = uploadRes.json();

                        if (!uploadData.success || !uploadData.result?.length) {
                            throw new Error("Upload failed to return document number");
                        }

                        const docNumber = uploadData.result[0].documentNumber;

                        // 🔹 Auto Disbursement
                        const pdAutoDisbursementRequest = {
                            url: `${insomnia.environment.get('host')}/invoice/pd/auto-disbursement`,
                            method: "POST",
                            header: {
                                "Content-Type": "application/json",
                                "Authorization": `Bearer ${token}`
                            },
                            body: {
                                mode: 'raw',
                                raw: JSON.stringify({
                                    data: {
                                        documents: [{ documentNumber: docNumber }],
                                        status: "INVOICE_FULLY_PAID_BY_BANK_TO_SELLER",
                                        userId: insomnia.variables.replaceIn('{{$randomUUID}}'),
                                        rfFlag: "AUTO",
                                        bankCharge: "0.00",
                                        buyerAmountLimit: "1000",
                                        chargeTo: "SELLER",
                                        discountingType: "RF",
                                        factorRate: "10.00",
                                        lendingTag: "TAG",
                                        processingFeeType: "PERCENTAGE",
                                        processingFee: "0.00",
                                        referenceId: insomnia.variables.replaceIn('{{$randomUUID}}'),
                                        transactionId: `UBL${generateRandomNumber(8)}`
                                    }
                                })
                            }
                        };

                        const pdRes = await send(pdAutoDisbursementRequest);

                        insomnia.test("PD Flow Complete: Auto Disbursement -> DISCOUNTED", () => {
                            insomnia.expect(pdRes.code).to.be.oneOf([200, 201]);
                        });

                    } catch (err) {
                        console.error("Flow error:", err);
                        throw err;
                    }

                });
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
