              isPrivate: false
              description: ""
              sortKey: -1773627756573
            method: POST
            body:
              mimeType: application/json
              text: "{\r

                \    \"userId\": \"{{userId}}\",\r

                \    \"password\": \"{{password}}\"\r

                }"
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              afterResponse: "insomnia.test(\"Sequential API Chain: Token -> Upload -> ADA on
                Due -> PAID\", function () {\r

                \    const generateRandomString = (length) => {\r

                \        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';\r

                \        let result = '';\r

                \        for (let i = 0; i < length; i++) {\r

                \            result += chars.charAt(Math.floor(Math.random() *
                chars.length));\r

                \        }\r

                \        return result;\r

                \    };\r

                \r

                \    const generateRandomNumber = (length) => {\r

                \        const chars = '0123456789';\r

                \        let result = '';\r

                \        for (let i = 0; i < length; i++) {\r

                \            result += chars.charAt(Math.floor(Math.random() *
                chars.length));\r

                \        }\r

                \        return result;\r

                \    };\r

                \r

                \    const tokenResponse = insomnia.response.json();\r

                \r

                \    if (tokenResponse.success === true) {\r

                \        const token = tokenResponse.result;\r

                \        insomnia.environment.set(\"blockchain_token\",
                token);\r

                \r

                \        const batchId = generateRandomString(10);\r

                \        const generatedDocNum = generateRandomString(12);\r

                \r

                \        const date = new Date();\r

                \        const randomDays = Math.floor(Math.random() * 30) +
                1;\r

                \        date.setDate(date.getDate() + randomDays);\r

                \r

                \        const futureDueDate =
                date.toISOString().split('T')[0];\r

                \        const today = new Date().toISOString().split('T')[0];\r

                \r

                \        const uploadRequest = {\r

                \            url:
                `${insomnia.environment.get('host')}/invoice/upload`,\r

                \            method: \"POST\",\r

                \            header: {\r

                \                \"Content-Type\": \"application/json\",\r

                \                \"Authorization\": `Bearer ${token}`\r

                \            },\r

                \            body: {\r

                \                mode: 'raw',\r

                \                raw: JSON.stringify({\r

                \                    \"role\": \"BUYER\",\r

                \                    \"userId\":
                insomnia.variables.replaceIn('{{$randomUUID}}'),\r

                \                    \"uploadCode\": \"internal\",\r

                \                    \"data\": {\r

                \                        \"batchId\": batchId,\r

                \                        \"fileName\": \"uploadfile.csv\",\r

                \                        \"orgCode\": \"EBC\",\r

                \                        \"role\": \"BUYER\",\r

                \                        \"documents\": [{\r

                \                            \"documentNumber\":
                generatedDocNum,\r

                \                            \"documentType\": \"IN\",\r

                \                            \"buyerCode\": \"EBC\",\r

                \                            \"buyerName\": \"Example Buyer
                Company\",\r

                \                            \"sellerCode\": \"ESC\",\r

                \                            \"sellerName\": \"Example Seller
                Company\",\r

                \                            \"transactionDate\": today,\r

                \                            \"deliveryDate\": today,\r

                \                            \"dueDate\": futureDueDate,\r

                \                            \"currency\": \"PHP\",\r

                \                            \"outstandingAmount\": 1000,\r

                \                            \"totalAmount\": \"1000.00\",\r

                \                            \"prioritySeller\": true\r

                \                        }]\r

                \                    }\r

                \                })\r

                \            }\r

                \        };\r

                \r

                \        insomnia.sendRequest(uploadRequest, (err, res) => {\r

                \            insomnia.test(\"PD Flow: Invoice Upload\", () =>
                {\r

                \                insomnia.expect(res.code).to.be.oneOf([200,
                201]);\r

                \            });\r

                \            if (err) return console.error(\"Upload API
                Error:\", err);\r

                \r

                \            const uploadData = res.json();\r

                \r

                \            if (uploadData.success && uploadData.result &&
                uploadData.result.length > 0) {\r

                \                const docNumberFromResponse =
                uploadData.result[0].documentNumber;\r

                \                const pdAutoDisbursementPayload = {\r

                \                    \"data\": {\r

                \                        \"documents\": [\r

                \                            { \"documentNumber\":
                docNumberFromResponse }\r

                \                        ],\r

                \                        \"status\":
                \"INVOICE_FULLY_PAID_BY_BANK_TO_SELLER\",\r

                \                        \"userId\":
                insomnia.variables.replaceIn('{{$randomUUID}}'),\r

                \                        \"rfFlag\": \"AUTO\",\r

                \                        \"bankCharge\": \"0.00\",\r

                \                        \"buyerAmountLimit\": \"1000\",\r

                \                        \"chargeTo\": \"SELLER\",\r

                \                        \"discountingType\": \"RF\",\r

                \                        \"factorRate\": \"10.00\",\r

                \                        \"lendingTag\": \"TAG\",\r

                \                        \"processingFeeType\":
                \"PERCENTAGE\",\r

                \                        \"processingFee\": \"0.00\",\r

                \                        \"referenceId\":
                insomnia.variables.replaceIn('{{$randomUUID}}'),\r

                \                        \"transactionId\":
                `UBL${generateRandomNumber(8)}`,\r

                \                    }\r

                \                }\r

                \r

                \                const pdAutoDisbursementRequest = {\r

                \                    url:
                `${insomnia.environment.get('host')}/invoice/pd/auto-disburseme\
                nt`,\r

                \                    method: \"POST\",\r

                \                    header: {\r

                \                        \"Content-Type\":
                \"application/json\",\r

                \                        \"Authorization\": `Bearer ${token}`\r

                \                    },\r

                \                    body: {\r

                \                        mode: 'raw',\r

                \                        raw:
                JSON.stringify(pdAutoDisbursementPayload)\r

                \                    }\r

                \                };\r

                \r

                \                insomnia.sendRequest(pdAutoDisbursementRequest,
                (err, pdAutoDisbursementResponse) => {\r

                \                    insomnia.test(\"PD Flow Complete: Auto
                Disbursement -> PAID\", () => {\r

                \                        insomnia.expect(pdAutoDisbursementResp\
                onse.code).to.be.oneOf([200, 201]);\r

                \                    });\r

                \                });\r

                \            } else {\r

                \                console.error(\"Upload failed to return a
                document number.\");\r

                \            }\r

                \        });\r

                \    }\r

                });"
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
